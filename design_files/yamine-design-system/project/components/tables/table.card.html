<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js?v=2"></script>
<style> body{ padding:24px; } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Table, Badge } = window.YamineDesignSystem_15fa45;
const rows = [
  { id: 1, device: "GD-400 · CH₄", zone: "Tank farm A", reading: "12 %LEL", status: "online", label: "Online" },
  { id: 2, device: "GD-400 · H₂S", zone: "Pump house", reading: "0.4 ppm", status: "online", label: "Online" },
  { id: 3, device: "TP-220 probe", zone: "Cold store 2", reading: "-18.4 °C", status: "warning", label: "Cal. due" },
  { id: 4, device: "VB-100 sensor", zone: "Compressor 1", reading: "4.2 mm/s", status: "error", label: "Alarm" },
  { id: 5, device: "CR-50 monitor", zone: "Clean room", reading: "352 p/m³", status: "offline", label: "Offline" },
];
function Demo(){
  const [sel, setSel] = React.useState([3]);
  return (
    <Table
      columns={[
        { key: "device", label: "Device" },
        { key: "zone", label: "Zone" },
        { key: "reading", label: "Reading", numeric: true },
        { key: "status", label: "Status", render: (r) => <Badge status={r.status}>{r.label}</Badge> },
      ]}
      rows={rows}
      selectedKeys={sel}
      onRowClick={(r)=>setSel([r.id])}
    />
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
