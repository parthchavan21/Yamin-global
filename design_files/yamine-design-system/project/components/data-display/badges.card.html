<!-- @dsCard group="Components" viewport="700x260" name="Badges, Chips & Status" subtitle="Device states, certification, filter chips (selectable / removable), live dots" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js?v=2"></script>
<style> body{ padding:24px; } .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; } .row + .row{ margin-top:16px; } .lbl{ font-size:11px; letter-spacing:.06em; text-transform:uppercase; font-weight:600; color:var(--content-tertiary); width:100%; margin-bottom:-6px;} </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Badge, Chip, StatusDot } = window.YamineDesignSystem_15fa45;
function Demo(){
  const [sel, setSel] = React.useState(true);
  return (
    <div>
      <div className="row"><span className="lbl">Status badges</span>
        <Badge status="online">Online</Badge>
        <Badge status="offline">Offline</Badge>
        <Badge status="certified">ATEX certified</Badge>
        <Badge status="warning">Calibration due</Badge>
        <Badge status="error">Alarm</Badge>
        <Badge status="maintenance">Maintenance</Badge>
        <Badge status="pending">Pending</Badge>
      </div>
      <div className="row"><span className="lbl">Chips</span>
        <Chip tone="brand">Gas detection</Chip>
        <Chip tone="info">ATEX</Chip>
        <Chip tone="success">Compliant</Chip>
        <Chip tone="warning">Review</Chip>
        <Chip selectable selected={sel} onClick={()=>setSel(s=>!s)}>Selectable</Chip>
        <Chip onRemove={()=>{}}>Removable</Chip>
      </div>
      <div className="row"><span className="lbl">Live status dots</span>
        <StatusDot status="online" pulse>Streaming</StatusDot>
        <StatusDot status="pending">Syncing</StatusDot>
        <StatusDot status="error">Signal lost</StatusDot>
        <StatusDot status="offline">Offline</StatusDot>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
