<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .tile { border: 1px solid var(--border-primary); border-radius: var(--radius-md); display:flex; align-items:center; justify-content:center; padding: 24px 16px; }
  .tile--dark { background: var(--surface-inverted); border-color: var(--surface-inverted); }
  img { display:block; }
</style>
</head>
<body>
  <div class="tile"><img src="../assets/yamine-logo.svg" alt="Yamine logo" height="40"></div>
  <div class="tile tile--dark"><img src="../assets/yamine-logo-inverted.svg" alt="Yamine logo on dark" height="40"></div>
  <div class="tile"><img src="../assets/yamine-mark.svg" alt="Yamine mark" height="44"></div>
</body>
</html>
