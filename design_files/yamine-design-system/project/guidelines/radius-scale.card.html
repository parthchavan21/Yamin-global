<!-- @dsCard group="Spacing" viewport="700x200" name="Radius scale" subtitle="Controlled rounding — xs 4 · sm 6 · md 8 · lg 12 · xl 16 · pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 24px; display: flex; gap: 20px; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .box { width: 84px; height: 64px; background: var(--surface-secondary); border: 1px solid var(--border-strong); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--content-secondary); }
  .pill { width: 84px; height: 36px; border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 4</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 6</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 8</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 12</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 16</span></div>
  <div class="item"><div class="box pill"></div><span class="lbl">pill · 999</span></div>
</body>
</html>
