<!-- @dsCard group="Dashboard" viewport="1366x768" name="Monitoring Dashboard" subtitle="Admin console — sidebar, metrics, alarms, device table (interactive)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Yamine Console</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js?v=2"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<style> body{ background: var(--surface-secondary); } </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="AppSidebar.jsx"></script>
<script type="text/babel" src="AppTopbar.jsx"></script>
<script type="text/babel" src="DashboardScreens.jsx"></script>
<script type="text/babel">
function App() {
  const { AppSidebar, AppTopbar, OverviewScreen, DevicesScreen, AlarmsScreen, PlaceholderScreen } = window;
  const [section, setSection] = React.useState("overview");
  const screen =
    section === "overview" ? <OverviewScreen onGoAlarms={() => setSection("alarms")} /> :
    section === "devices" ? <DevicesScreen /> :
    section === "alarms" ? <AlarmsScreen /> :
    <PlaceholderScreen name={section.charAt(0).toUpperCase() + section.slice(1)} />;
  return (
    <div style={{ display: "flex", minHeight: "100vh" }}>
      <AppSidebar active={section} onSelect={setSection} />
      <main style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}>
        <AppTopbar section={section} />
        <div style={{ padding: 24, maxWidth: 1200, width: "100%", margin: "0 auto" }}>
          {screen}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
